<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro</title>
    <link rel="stylesheet" href="calculadora.css">
</head>y
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" placeholder="0" inputmode="none">
        
        <div class="buttons">
            <button class="btn clear" onclick="clearDisplay()">C</button>
            <button class="btn backspace" onclick="deleteLast()">«</button>
            <button class="btn operator" onclick="insertParentheses()">()</button>
            <button class="btn operator" onclick="insertChar('/')">/</button>
            
            <button class="btn number" onclick="insertChar('7')">7</button>
            <button class="btn number" onclick="insertChar('8')">8</button>
            <button class="btn number" onclick="insertChar('9')">9</button>
            <button class="btn operator" onclick="insertChar('*')">*</button>
            
            <button class="btn number" onclick="insertChar('4')">4</button>
            <button class="btn number" onclick="insertChar('5')">5</button>
            <button class="btn number" onclick="insertChar('6')">6</button>
            <button class="btn operator" onclick="insertChar('-')">-</button>
            
            <button class="btn number" onclick="insertChar('1')">1</button>
            <button class="btn number" onclick="insertChar('2')">2</button>
            <button class="btn number" onclick="insertChar('3')">3</button>
            <button class="btn operator" onclick="insertChar('+')">+</button>

            <button class="btn number zero" onclick="insertChar('0')">0</button>
            <button class="btn number" onclick="insertChar(',')">,</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
